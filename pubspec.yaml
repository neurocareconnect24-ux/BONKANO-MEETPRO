name: bonkano_meet_pro
description: A new Flutter project.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.0+4

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  #Commons
  nb_utils: ^7.1.4
  google_fonts: ^6.2.1
  html: ^0.15.6
  http: ^1.3.0
  intl: ^0.20.2
  cached_network_image: ^3.4.1
  url_launcher: ^6.3.1
  flutter_vector_icons: ^2.0.0
  lottie: ^3.3.1
  flutter_svg: ^2.1.0
  flutter_svg_provider: ^1.0.7
  stream_transform: ^2.1.1
  flutter_local_notifications: ^19.1.0
  carousel_slider: ^5.0.0
  flutter_spinkit: ^5.2.1
  responsive_navigation_bar: ^5.0.2
  date_picker_timeline: ^1.2.6
  signature: ^6.0.0
  syncfusion_flutter_charts: ^29.1.40
  expandable_page_view: ^1.0.17
  datepicker_dropdown: ^0.1.7
  pro_image_editor: ^9.6.0
  

  #firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.5
  firebase_crashlytics: ^4.3.5
  firebase_messaging: ^15.2.5
  firebase_storage: ^12.4.2

  # SOCIAL LOGIN
  the_apple_sign_in: ^1.1.1
  google_sign_in: ^6.3.0
  googleapis: ^14.0.0
  googleapis_auth: ^2.0.0
  extension_google_sign_in_as_googleapis_auth: ^2.0.13

  # Video Call
  agora_rtc_engine: ^6.3.2

  permission_handler: ^12.0.0+1
  path_provider: ^2.1.5

  # State Management
  get: ^4.7.2

  #Storage
  get_storage: ^2.1.1
  flutter_secure_storage: ^9.2.4
  path: ^1.9.1

  #PhotoViewGallery
  photo_view: ^0.15.0

  #Pickers
  file_picker: ^10.1.2
  image_picker: ^1.1.2
  country_picker: ^2.0.27
  flutter_time_picker_spinner: ^2.0.0

  # Google Map
  google_maps_flutter: ^2.12.1
  geolocator: ^14.0.0
  geocoding: ^3.0.0

  flutter_localizations:
    sdk: flutter
  percent_indicator: ^4.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

# The following section is specific to Flutter packages.
flutter:

  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/
    - assets/flags/
    - assets/images/
    - assets/icons/
    - assets/lottie/
    - assets/icons/navigation/
    - assets/icons/social_media/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "logo_blanc.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "logo_blanc.png"
  web:
    generate: true
    image_path: "logo_blanc.png"
  windows:
    generate: true
    image_path: "logo_blanc.png"
    icon_size: 48
